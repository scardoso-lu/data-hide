<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PII Pipeline Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .nav-link.active { font-weight: 600; }
    .mono { font-family: monospace; font-size: .85em; }
    .badge-enabled { background-color: #198754; }
    .badge-disabled { background-color: #6c757d; }
    .truncate { max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    th { white-space: nowrap; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">🔒 PII Admin</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/targets' in request.path %}active{% endif %}" href="/targets">Table Targets</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/config' in request.path %}active{% endif %}" href="/config">Runtime Config</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/exclusions' in request.path %}active{% endif %}" href="/exclusions">Column Exclusions</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/runs' in request.path %}active{% endif %}" href="/runs">Pipeline Runs</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
