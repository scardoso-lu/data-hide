services:

  # ── PostgreSQL audit database ────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: pii_audit
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d pii_audit"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── PII anonymization pipeline ───────────────────────────────────────────────
  pipeline:
    build: ./backend
    env_file:
      - ./backend/.env                # Azure creds, Purview, classifier settings, etc.
    environment:
      # Overrides any DATABASE_URL that might be present in .env so the
      # pipeline always talks to the compose-managed Postgres instance.
      DATABASE_URL: postgresql://pipeline:pipeline@db:5432/pii_audit
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - spacy_models:/app/models       # cache spaCy models between one-shot runs
    restart: "no"                      # one-shot batch job — do not auto-restart
    # Mirrors the Azure Container Apps liveness probe (deploy/containerapp.yaml)
    # so local runs exercise the same endpoint. start_period covers the heavy
    # import window before app/health.py starts serving.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    # Hard memory ceiling for the pipeline container.
    # Without this the Linux OOM killer fires at an unpredictable host-level
    # threshold and "docker stats" shows no % indicator.  With it:
    #   • exit 137 + OOMKilled=true appears in "docker inspect / events"
    #   • "docker stats" shows memory % so you can watch it climb
    #   • the pre-read log lines (parquet_files, compressed_size, process_rss)
    #     tell you exactly which table was being loaded when the kill happened
    # Tune this to match your host.  Rule of thumb: 3–5× the largest table's
    # uncompressed in-memory size (Parquet decompresses 3–8×; Pandas adds more).
    # Set PIPELINE_MEMORY_LIMIT in .env or override on the CLI:
    #   PIPELINE_MEMORY_LIMIT=12g docker compose up
    mem_limit: "${PIPELINE_MEMORY_LIMIT:-8g}"
    memswap_limit: "${PIPELINE_MEMORY_LIMIT:-8g}"  # disable swap → fast fail, not thrash

  # ── Next.js admin frontend ───────────────────────────────────────────────────
  frontend:
    build: ./frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    environment:
      # Infra overrides ONLY. Everything auth-related (AUTH_SECRET, AUTH_URL,
      # AZURE_AD_CLIENT_ID/SECRET/TENANT_ID) comes from ./frontend/.env via the
      # env_file above — do NOT redeclare those here.
      #
      # Why: keys in this block override env_file, and "${VAR}" interpolation is
      # resolved by Compose from the project-root .env / shell — NOT from
      # frontend/.env. The previous "${AUTH_SECRET}" entries therefore resolved
      # to empty strings and clobbered the values configured in frontend/.env.
      #
      # DATABASE_URL is overridden intentionally so the frontend always talks to
      # the compose-managed Postgres regardless of what frontend/.env contains.
      DATABASE_URL: postgresql://pipeline:pipeline@db:5432/pii_audit
      AUTH_TRUST_HOST: "true"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  spacy_models:
