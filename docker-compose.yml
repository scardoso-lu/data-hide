services:

  # ── PostgreSQL audit database ────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: pii_audit
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d pii_audit"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── PII anonymization pipeline ───────────────────────────────────────────────
  pipeline:
    build: .
    env_file:
      - .env                          # Azure creds, Purview, classifier settings, etc.
    environment:
      # Overrides any DATABASE_URL that might be present in .env so the
      # pipeline always talks to the compose-managed Postgres instance.
      DATABASE_URL: postgresql://pipeline:pipeline@db:5432/pii_audit
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - spacy_models:/app/models       # cache spaCy models between one-shot runs
    restart: "no"                      # one-shot batch job — do not auto-restart
    # Hard memory ceiling for the pipeline container.
    # Without this the Linux OOM killer fires at an unpredictable host-level
    # threshold and "docker stats" shows no % indicator.  With it:
    #   • exit 137 + OOMKilled=true appears in "docker inspect / events"
    #   • "docker stats" shows memory % so you can watch it climb
    #   • the pre-read log lines (parquet_files, compressed_size, process_rss)
    #     tell you exactly which table was being loaded when the kill happened
    # Tune this to match your host.  Rule of thumb: 3–5× the largest table's
    # uncompressed in-memory size (Parquet decompresses 3–8×; Pandas adds more).
    # Set PIPELINE_MEMORY_LIMIT in .env or override on the CLI:
    #   PIPELINE_MEMORY_LIMIT=12g docker compose up
    mem_limit: "${PIPELINE_MEMORY_LIMIT:-8g}"
    memswap_limit: "${PIPELINE_MEMORY_LIMIT:-8g}"  # disable swap → fast fail, not thrash

  # ── Next.js auth gateway ─────────────────────────────────────────────────────
  # Handles Microsoft Entra ID (Azure AD) login only.  All /admin/* routes are
  # proxied to the internal Flask admin service — no admin logic lives in JS.
  server:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_URL: "${AUTH_URL:-http://localhost:3000}"
      AUTH_TRUST_HOST: "true"
      AZURE_AD_CLIENT_ID: "${AZURE_AD_CLIENT_ID}"
      AZURE_AD_CLIENT_SECRET: "${AZURE_AD_CLIENT_SECRET}"
      AZURE_AD_TENANT_ID: "${AZURE_AD_TENANT_ID:-}"
      # Proxy target and shared secret for the /admin/* proxy route
      FLASK_ADMIN_URL: "http://admin:5001"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
    depends_on:
      db:
        condition: service_healthy
      admin:
        condition: service_started
    restart: unless-stopped

  # ── Python admin UI (Flask + SQLAlchemy) ─────────────────────────────────────
  # Not exposed externally — only reachable from the Next.js proxy above.
  # Validates X-Admin-Token on every request; rejects direct access.
  admin:
    build: ./admin
    environment:
      DATABASE_URL: postgresql://pipeline:pipeline@db:5432/pii_audit
      FLASK_SECRET_KEY: "${FLASK_SECRET_KEY:-change-me-in-production}"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  spacy_models:
